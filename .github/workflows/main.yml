name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # =========================================================
    # 1. CHECKOUT CODE
    # =========================================================
    - name: Checkout code
      uses: actions/checkout@v4

    # =========================================================
    # 2. KIỂM TRA FILE CẦN THIẾT
    # =========================================================
    - name: Check required files
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 1: KIỂM TRA FILE CẦN THIẾT"
        echo "=========================================="
        
        if [ -f "main.py" ]; then
          echo "✅ main.py exists"
        else
          echo "❌ main.py MISSING"
          exit 1
        fi
        
        if [ -f "buildozer.spec" ]; then
          echo "✅ buildozer.spec exists"
        else
          echo "❌ buildozer.spec MISSING"
          exit 1
        fi
        
        echo "✅ Tất cả file cần thiết đều có"

    # =========================================================
    # 3. KIỂM TRA CÚ PHÁP PYTHON
    # =========================================================
    - name: Check Python syntax
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 2: KIỂM TRA CÚ PHÁP PYTHON"
        echo "=========================================="
        
        python -m py_compile main.py
        if [ $? -eq 0 ]; then
          echo "✅ main.py syntax OK"
        else
          echo "❌ main.py syntax ERROR"
          exit 1
        fi

    # =========================================================
    # 4. KIỂM TRA AST
    # =========================================================
    - name: Check Python AST
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 3: KIỂM TRA CẤU TRÚC CODE"
        echo "=========================================="
        
        python -c "
import ast
with open('main.py', 'r', encoding='utf-8') as f:
    try:
        ast.parse(f.read())
        print('✅ AST parse OK')
    except SyntaxError as e:
        print(f'❌ AST parse error: {e}')
        exit(1)
"

    # =========================================================
    # 5. KIỂM TRA buildozer.spec
    # =========================================================
    - name: Validate buildozer.spec
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 4: KIỂM TRA buildozer.spec"
        echo "=========================================="
        
        grep -q "requirements" buildozer.spec && echo "✅ requirements found"
        grep -q "android.api" buildozer.spec && echo "✅ android.api found"
        grep -q "android.ndk" buildozer.spec && echo "✅ android.ndk found"
        grep -q "android.permissions" buildozer.spec && echo "✅ android.permissions found"
        
        echo "✅ buildozer.spec check completed"

    # =========================================================
    # 6. KIỂM TRA IMPORT THƯ VIỆN
    # =========================================================
    - name: Check Python imports
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 5: KIỂM TRA IMPORT THƯ VIỆN"
        echo "=========================================="
        
        python -c "
modules = ['kivy', 'kivy.app', 'kivy.uix.screenmanager', 'kivy.uix.boxlayout']
for m in modules:
    try:
        __import__(m)
        print(f'✅ {m} OK')
    except ImportError as e:
        print(f'⚠️ {m}: {e}')
"

    # =========================================================
    # 7. KIỂM TRA CẤU TRÚC THƯ MỤC
    # =========================================================
    - name: Check repository structure
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 6: KIỂM TRA CẤU TRÚC THƯ MỤC"
        echo "=========================================="
        
        ls -la
        echo "✅ Structure check completed"

    # =========================================================
    # 8. SETUP PYTHON
    # =========================================================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Verify Python version
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 7: XÁC NHẬN PYTHON"
        echo "=========================================="
        python --version

    # =========================================================
    # 9. SETUP JAVA
    # =========================================================
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Verify Java version
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 8: XÁC NHẬN JAVA"
        echo "=========================================="
        java -version

    # =========================================================
    # 10. CÀI ĐẶT DEPENDENCIES
    # =========================================================
    - name: Install system dependencies
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 9: CÀI ĐẶT DEPENDENCIES"
        echo "=========================================="
        
        sudo apt-get update
        sudo apt-get install -y libzbar-dev
        pip install --upgrade pip
        pip install buildozer cython
        
        echo "✅ Dependencies installed"

    # =========================================================
    # 11. CACHE
    # =========================================================
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

    # =========================================================
    # 12. DỌN BUILD CŨ
    # =========================================================
    - name: Clean previous builds
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 10: DỌN BUILD CŨ"
        echo "=========================================="
        buildozer android clean || true
        rm -rf bin || true

    # =========================================================
    # 13. BUILD APK
    # =========================================================
    - name: Build APK
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 11: BUILD APK"
        echo "=========================================="
        echo "⏳ Quá trình build có thể mất 15-20 phút..."
        echo ""
        buildozer android debug

    # =========================================================
    # 14. KIỂM TRA KẾT QUẢ
    # =========================================================
    - name: Check build result
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 12: KIỂM TRA KẾT QUẢ"
        echo "=========================================="
        
        if [ -d "bin" ] && ls bin/*.apk 1>/dev/null 2>&1; then
          echo "✅ BUILD THÀNH CÔNG!"
          ls -la bin/
        else
          echo "❌ BUILD THẤT BẠI!"
          exit 1
        fi

    # =========================================================
    # 15. UPLOAD APK
    # =========================================================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: order-printer-apk
        path: bin/*.apk

    # =========================================================
    # 16. UPLOAD LOG LỖI (NẾU CÓ)
    # =========================================================
    - name: Upload error logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-error-logs
        path: .buildozer/logs/
