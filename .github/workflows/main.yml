name: Build Android APK

on:
push:
branches:
- main

workflow_dispatch:

jobs:
build:
runs-on: ubuntu-22.04

```
env:
  TERM: dumb
  BUILDOZER_WARN_ON_ROOT: "0"
  PYTHONUNBUFFERED: "1"
  PYTHONNOUSERSITE: "1"

steps:

  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Verify required files
    run: |
      echo "📁 Repository files:"
      ls -la

      FILES=(
        "main.py"
        "buildozer.spec"
        "icon.png"
      )

      for file in "${FILES[@]}"
      do
        if [ ! -f "$file" ]; then
          echo "❌ Missing required file: $file"
          exit 1
        else
          echo "✅ Found: $file"
        fi
      done

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Verify Python version
    run: |
      echo "===== PYTHON INFO ====="

      which python
      python --version

      which python3
      python3 --version

      pip --version

      python - <<EOF
      import sys
      print("Python executable:", sys.executable)
      print("Python version:", sys.version)
      EOF

  - name: Setup Java 17
    uses: actions/setup-java@v4
    with:
      distribution: "temurin"
      java-version: "17"

  - name: Cache pip
    uses: actions/cache@v4
    with:
      path: ~/.cache/pip
      key: pip-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
      restore-keys: |
        pip-${{ runner.os }}-

  - name: Cache Buildozer
    uses: actions/cache@v4
    with:
      path: ~/.buildozer
      key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
      restore-keys: |
        buildozer-${{ runner.os }}-

  - name: Cache Gradle
    uses: actions/cache@v4
    with:
      path: ~/.gradle
      key: gradle-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
      restore-keys: |
        gradle-${{ runner.os }}-

  - name: Install system dependencies
    run: |
      sudo apt-get update

      sudo apt-get install -y \
        zip unzip git \
        autoconf automake libtool \
        pkg-config zlib1g-dev \
        libncurses5-dev libncursesw5-dev \
        cmake libffi-dev libssl-dev \
        liblzma-dev libsqlite3-dev \
        libjpeg-dev libfreetype6-dev \
        build-essential \
        ccache \
        patch \
        rsync \
        m4

  - name: Install Python packages
    run: |
      python -m pip install --upgrade pip setuptools wheel

      pip install \
        Cython==0.29.36 \
        buildozer==1.5.0

      pip install \
        git+https://github.com/kivy/python-for-android.git@develop

  - name: Python syntax check
    run: |
      python -m py_compile main.py

  - name: Validate Python AST
    run: |
      python - <<EOF
      import ast

      with open("main.py", "r", encoding="utf-8") as f:
          ast.parse(f.read())

      print("✅ AST parse OK")
      EOF

  - name: Validate buildozer.spec
    run: |
      echo "========== buildozer.spec =========="
      cat buildozer.spec
      echo "===================================="

      grep "requirements" buildozer.spec || exit 1
      grep "android.api" buildozer.spec || exit 1
      grep "android.ndk" buildozer.spec || exit 1

      echo "✅ buildozer.spec validated"

  - name: Detect risky packages
    run: |
      echo "Checking risky packages..."

      if grep -i "reportlab" buildozer.spec; then
        echo "⚠️ WARNING: reportlab may fail on Android builds"
      fi

      if grep -i "kivy-garden.zbarcam" buildozer.spec; then
        echo "⚠️ WARNING: zbarcam is a common build failure source"
      fi

      echo "✅ package scan complete"

  - name: Patch libtool
    run: |
      sudo ln -sf /usr/bin/libtoolize /usr/bin/libtool || true

  - name: Install Android SDK & NDK
    run: |
      export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
      export ANDROID_SDK_ROOT=$ANDROID_HOME

      mkdir -p $ANDROID_HOME/cmdline-tools

      cd /tmp

      wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip

      unzip -q tools.zip

      mkdir -p $ANDROID_HOME/cmdline-tools/latest

      mv cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/ || true

      yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
        --sdk_root=$ANDROID_HOME \
        --licenses

      yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
        --sdk_root=$ANDROID_HOME \
        "platform-tools" \
        "platforms;android-34" \
        "build-tools;34.0.0"

      mkdir -p $HOME/.buildozer/android/platform

      cd $HOME/.buildozer/android/platform

      wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O ndk.zip

      unzip -q ndk.zip

      mv android-ndk-r25b android-ndk

  - name: Clean previous builds
    run: |
      buildozer android clean || true

  - name: Build APK
    id: build_apk
    run: |
      mkdir -p build-logs

      export CFLAGS="-fPIC"

      buildozer android debug --verbose \
        2>&1 | tee build-logs/full-build.log

  - name: Locate APK
    if: always()
    run: |
      mkdir -p bin

      find . -name "*.apk" -exec cp {} bin/ \; || true

      echo "📦 APK files:"
      ls -la bin || true

  - name: Generate failure summary
    if: failure()
    run: |
      grep -i -E \
        "error|failed|exception|traceback|sdk|ndk|zbar|cython|gradle|javac|No module named" \
        build-logs/full-build.log \
        | tail -200 \
        > build-logs/error-summary.txt || true

      echo "========= ERROR SUMMARY ========="

      cat build-logs/error-summary.txt || true

  - name: Upload APK
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: built-apk
      path: bin/*.apk
      if-no-files-found: warn

  - name: Upload build logs
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: build-logs
      path: build-logs/
```
