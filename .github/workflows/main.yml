name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # =========================================================
    # 1. CHECKOUT CODE
    # =========================================================
    - name: Checkout code
      uses: actions/checkout@v4

    # =========================================================
    # 2. KIỂM TRA FILE CẦN THIẾT
    # =========================================================
    - name: Check required files
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 1: KIỂM TRA FILE CẦN THIẾT"
        echo "=========================================="
        
        FILES=("main.py" "buildozer.spec")
        MISSING=0
        
        for file in "${FILES[@]}"; do
          if [ -f "$file" ]; then
            echo "✅ $file exists"
          else
            echo "❌ $file MISSING"
            MISSING=1
          fi
        done
        
        if [ $MISSING -eq 1 ]; then
          echo "❌ Thiếu file cần thiết, dừng build"
          exit 1
        fi
        echo "✅ Tất cả file cần thiết đều có"

    # =========================================================
    # 3. KIỂM TRA CÚ PHÁP PYTHON
    # =========================================================
    - name: Check Python syntax
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 2: KIỂM TRA CÚ PHÁP PYTHON"
        echo "=========================================="
        
        python -m py_compile main.py
        if [ $? -eq 0 ]; then
          echo "✅ main.py syntax OK"
        else
          echo "❌ main.py syntax ERROR"
          exit 1
        fi

    # =========================================================
    # 4. KIỂM TRA AST (Cấu trúc code)
    # =========================================================
    - name: Check Python AST
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 3: KIỂM TRA CẤU TRÚC CODE"
        echo "=========================================="
        
        python << 'EOF'
import ast
import sys

with open('main.py', 'r', encoding='utf-8') as f:
    try:
        ast.parse(f.read())
        print('✅ AST parse OK')
    except SyntaxError as e:
        print(f'❌ AST parse error: {e}')
        sys.exit(1)
EOF

    # =========================================================
    # 5. KIỂM TRA THƯ VIỆN IMPORT
    # =========================================================
    - name: Check Python imports
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 4: KIỂM TRA IMPORT THƯ VIỆN"
        echo "=========================================="
        
        python << 'EOF'
import sys
import warnings
warnings.filterwarnings('ignore')

modules = ['kivy', 'kivy.app', 'kivy.uix.screenmanager', 'kivy.uix.boxlayout', 'kivy.uix.label']
errors = []

for module in modules:
    try:
        __import__(module)
        print(f'✅ {module} OK')
    except ImportError as e:
        print(f'⚠️ {module}: {e} (có thể cài sau)')
EOF

    # =========================================================
    # 6. KIỂM TRA buildozer.spec
    # =========================================================
    - name: Validate buildozer.spec
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 5: KIỂM TRA buildozer.spec"
        echo "=========================================="
        
        # Kiểm tra các dòng bắt buộc
        REQUIRED=("requirements" "android.api" "android.ndk" "android.permissions" "package.name")
        
        for line in "${REQUIRED[@]}"; do
          if grep -q "^$line" buildozer.spec; then
            echo "✅ Found: $line"
          else
            echo "⚠️ Warning: $line not found"
          fi
        done
        
        # Kiểm tra Python version
        if grep -q "python3==3.10.12" buildozer.spec; then
          echo "✅ Python 3.10.12 configured"
        else
          echo "⚠️ Python version not fixed"
        fi
        
        # Kiểm tra Kivy version
        if grep -q "kivy==2.2.1" buildozer.spec; then
          echo "✅ Kivy 2.2.1 configured"
        else
          echo "⚠️ Kivy version not fixed (may cause issues)"
        fi
        
        # Kiểm tra API level
        API=$(grep "android.api" buildozer.spec | cut -d'=' -f2 | tr -d ' ')
        if [ "$API" -le 30 ]; then
          echo "✅ android.api = $API (<=30 is stable)"
        else
          echo "⚠️ android.api = $API (>30 may have issues)"
        fi

    # =========================================================
    # 7. KIỂM TRA CẤU TRÚC THƯ MỤC
    # =========================================================
    - name: Check repository structure
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 6: KIỂM TRA CẤU TRÚC THƯ MỤC"
        echo "=========================================="
        
        echo "Cấu trúc thư mục:"
        ls -la
        
        if [ -f "wifi_printers.json" ]; then
          echo "✅ wifi_printers.json exists"
        else
          echo "⚠️ wifi_printers.json not found (app will auto-create)"
        fi

    # =========================================================
    # 8. SETUP PYTHON
    # =========================================================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Verify Python version
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 7: XÁC NHẬN PYTHON VERSION"
        echo "=========================================="
        python --version
        pip --version

    # =========================================================
    # 9. SETUP JAVA
    # =========================================================
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Verify Java version
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 8: XÁC NHẬN JAVA VERSION"
        echo "=========================================="
        java -version

    # =========================================================
    # 10. CÀI ĐẶT DEPENDENCIES HỆ THỐNG
    # =========================================================
    - name: Install system dependencies
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 9: CÀI ĐẶT DEPENDENCIES HỆ THỐNG"
        echo "=========================================="
        
        sudo apt-get update
        sudo apt-get install -y libzbar-dev
        echo "✅ libzbar-dev installed"

    # =========================================================
    # 11. CÀI ĐẶT BUILD TOOLS
    # =========================================================
    - name: Install build tools
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 10: CÀI ĐẶT BUILD TOOLS"
        echo "=========================================="
        
        pip install --upgrade pip
        pip install buildozer cython
        echo "✅ buildozer version: $(buildozer --version)"

    # =========================================================
    # 12. CACHE BUILD
    # =========================================================
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

    # =========================================================
    # 13. KIỂM TRA BUILD TRƯỚC
    # =========================================================
    - name: Clean previous builds
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 11: DỌN BUILD CŨ"
        echo "=========================================="
        buildozer android clean || true
        rm -rf bin .buildozer/logs || true

    # =========================================================
    # 14. BUILD APK
    # =========================================================
    - name: Build APK
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 12: BUILD APK"
        echo "=========================================="
        echo "⏳ Quá trình build có thể mất 15-20 phút..."
        echo ""
        
        buildozer android debug

    # =========================================================
    # 15. KIỂM TRA KẾT QUẢ BUILD
    # =========================================================
    - name: Check build result
      run: |
        echo "=========================================="
        echo "🔍 BƯỚC 13: KIỂM TRA KẾT QUẢ BUILD"
        echo "=========================================="
        
        if [ -d "bin" ] && [ "$(ls -A bin/*.apk 2>/dev/null)" ]; then
          echo "✅ BUILD THÀNH CÔNG!"
          echo ""
          echo "📦 FILE APK:"
          ls -la bin/
        else
          echo "❌ BUILD THẤT BẠI!"
          echo "Không tìm thấy file APK trong thư mục bin/"
          exit 1
        fi

    # =========================================================
    # 16. UPLOAD APK
    # =========================================================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: order-printer-apk
        path: bin/*.apk

    # =========================================================
    # 17. UPLOAD LOG (NẾU LỖI)
    # =========================================================
    - name: Upload error logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-error-logs
        path: |
          .buildozer/logs/
          build.log
