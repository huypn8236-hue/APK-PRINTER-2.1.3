name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Accept Android SDK licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | sdkmanager --licenses 2>/dev/null || true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip python3-pip \
          libffi-dev libssl-dev libsqlite3-dev \
          libjpeg-dev libfreetype6-dev zlib1g-dev \
          automake autoconf libtool libtool-bin \
          autopoint gettext pkg-config m4 \
          make cmake ninja-build libzbar-dev
        pip install --upgrade pip wheel setuptools Cython==0.29.36
        pip install buildozer==1.5.0

    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-${{ runner.os }}-

    - name: Clean previous builds (optional)
      run: |
        rm -rf .buildozer/android/platform/build-arm64-v8a_armeabi-v7a || true
        rm -rf bin || true

    - name: Build APK
      run: |
        export CFLAGS="-fPIC"
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: order-printer-apk
        path: bin/*.apk
