name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check required files
      run: |
        echo "🔍 KIỂM TRA FILE CẦN THIẾT"
        echo "=========================="
        if [ -f "main.py" ]; then
          echo "✅ main.py exists"
        else
          echo "❌ main.py MISSING"
          exit 1
        fi
        if [ -f "buildozer.spec" ]; then
          echo "✅ buildozer.spec exists"
        else
          echo "❌ buildozer.spec MISSING"
          exit 1
        fi
        echo "✅ Tất cả file cần thiết đều có"

    - name: Check Python syntax
      run: |
        echo "🔍 KIỂM TRA CÚ PHÁP PYTHON"
        echo "=========================="
        python -m py_compile main.py
        if [ $? -eq 0 ]; then
          echo "✅ main.py syntax OK"
        else
          echo "❌ main.py syntax ERROR"
          exit 1
        fi

    - name: Check buildozer.spec
      run: |
        echo "🔍 KIỂM TRA BUILDozer.SPEC"
        echo "=========================="
        grep -q "requirements" buildozer.spec && echo "✅ requirements found"
        grep -q "android.api" buildozer.spec && echo "✅ android.api found"
        grep -q "android.ndk" buildozer.spec && echo "✅ android.ndk found"
        echo "✅ buildozer.spec check completed"

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: |
        echo "🔍 CÀI ĐẶT DEPENDENCIES"
        echo "======================"
        sudo apt-get update
        sudo apt-get install -y libzbar-dev
        pip install --upgrade pip
        pip install buildozer cython
        echo "✅ Dependencies installed"

    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

    - name: Build APK
      run: |
        echo "🔍 BẮT ĐẦU BUILD APK"
        echo "==================="
        buildozer android debug

    - name: Check build result
      run: |
        echo "🔍 KIỂM TRA KẾT QUẢ BUILD"
        echo "========================"
        if [ -d "bin" ] && ls bin/*.apk 1>/dev/null 2>&1; then
          echo "✅ APK đã được tạo thành công!"
          ls -la bin/
        else
          echo "❌ KHÔNG TÌM THẤY FILE APK"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: order-printer-apk
        path: bin/*.apk

    - name: Upload error log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-error-log
        path: .buildozer/logs/
