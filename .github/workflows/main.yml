name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check required files
      run: |
        echo "=== CHECK FILES ==="
        if [ -f "main.py" ]; then
          echo "✅ main.py"
        else
          echo "❌ main.py not found"
          exit 1
        fi
        if [ -f "buildozer.spec" ]; then
          echo "✅ buildozer.spec"
        else
          echo "❌ buildozer.spec not found"
          exit 1
        fi

    - name: Build APK with Docker
      run: |
        docker run --rm \
          -v $(pwd):/app \
          -v ~/.buildozer:/home/user/.buildozer \
          docker.io/kivy/buildozer:latest \
          buildozer android debug

    - name: Check build result
      run: |
        if [ -f bin/*.apk ]; then
          echo "✅ Build thành công!"
          ls -la bin/
        else
          echo "❌ Build thất bại - không tìm thấy file APK"
          ls -la || true
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: order-printer-apk
        path: bin/*.apk
