name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # B1: Checkout
    - name: Checkout code
      uses: actions/checkout@v4

    # B2: Check file tồn tại
    - name: Check required files
      run: |
        echo "=== CHECK FILE ==="
        if [ -f "main.py" ]; then
          echo "OK: main.py"
        else
          echo "FAIL: main.py not found"
          exit 1
        fi
        if [ -f "buildozer.spec" ]; then
          echo "OK: buildozer.spec"
        else
          echo "FAIL: buildozer.spec not found"
          exit 1
        fi

    # B3: Check Python syntax
    - name: Check Python syntax
      run: |
        echo "=== CHECK SYNTAX ==="
        python -m py_compile main.py
        if [ $? -eq 0 ]; then
          echo "OK: Python syntax"
        else
          echo "FAIL: Python syntax error"
          exit 1
        fi

    # B4: Check buildozer.spec
    - name: Check buildozer.spec content
      run: |
        echo "=== CHECK SPEC ==="
        grep -q "requirements" buildozer.spec && echo "OK: requirements"
        grep -q "android.api" buildozer.spec && echo "OK: android.api"
        grep -q "android.ndk" buildozer.spec && echo "OK: android.ndk"
        grep -q "android.permissions" buildozer.spec && echo "OK: permissions"

    # B5: Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # B6: Verify Python
    - name: Verify Python
      run: |
        echo "=== PYTHON ==="
        python --version

    # B7: Setup Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # B8: Verify Java
    - name: Verify Java
      run: |
        echo "=== JAVA ==="
        java -version

    # B9: Install dependencies
    - name: Install dependencies
      run: |
        echo "=== INSTALL DEPS ==="
        sudo apt-get update
        sudo apt-get install -y libzbar-dev
        pip install --upgrade pip
        pip install buildozer cython
        echo "OK: Dependencies installed"

    # B10: Verify buildozer
    - name: Verify buildozer
      run: |
        echo "=== BUILDIZER ==="
        buildozer --version

    # B11: Cache
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

    # B12: Clean old builds
    - name: Clean previous builds
      run: |
        echo "=== CLEAN ==="
        buildozer android clean || true
        rm -rf bin || true

    # B13: Build APK
    - name: Build APK
      run: |
        echo "=== BUILD APK ==="
        echo "Time: ~15-20 minutes"
        buildozer android debug

    # B14: Check result
    - name: Check build result
      run: |
        echo "=== CHECK RESULT ==="
        if [ -d "bin" ] && ls bin/*.apk 1>/dev/null 2>&1; then
          echo "OK: APK created"
          ls -la bin/
        else
          echo "FAIL: No APK found"
          exit 1
        fi

    # B15: Upload APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: order-printer-apk
        path: bin/*.apk

    # B16: Upload error logs if fail
    - name: Upload error logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: .buildozer/logs/
